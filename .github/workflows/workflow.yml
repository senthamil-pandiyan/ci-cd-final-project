name: CI workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  
jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip        
        pip install -r requirements.txt > cicd-github-validation
        
    - name: Install project
      run: pip install -e .

    - name: Lint with flake8
      run: |
        flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics | tee cicd-github-validation
        flake8 service --count --max-complexity=10 --max-line-length=127 --statistics | tee -a cicd-github-validation

    - name: Run unit tests with nose
      run: |
        nosetests -v --with-spec --spec-color --with-coverage --cover-package=service | tee -a cicd-github-validation

    - name: Upload log
      uses: actions/upload-artifact@v4
      with:
        path: cicd-github-validation

